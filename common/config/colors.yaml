# =============================================================================
# CONFIG: BUTTON COLORS
# =============================================================================
# Primary (on), secondary (off), and tertiary (sensor card) colours shared
# across all devices. Values are 6-digit hex strings without the # prefix.
# =============================================================================

text:
  - platform: template
    name: "Button On Color"
    internal: true
    id: button_on_color
    optimistic: true
    restore_value: true
    initial_value: "FF8C00"
    min_length: 6
    max_length: 6
    mode: text
    entity_category: config
    icon: "mdi:palette"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Button Off Color"
    internal: true
    id: button_off_color
    optimistic: true
    restore_value: true
    initial_value: "313131"
    min_length: 6
    max_length: 6
    mode: text
    entity_category: config
    icon: "mdi:palette-outline"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Sensor Card Color"
    internal: true
    id: sensor_card_color
    optimistic: true
    restore_value: true
    initial_value: "212121"
    min_length: 6
    max_length: 6
    mode: text
    entity_category: config
    icon: "mdi:palette-outline"
    update_interval: never
    web_server:
      sorting_group_id: sg_display
