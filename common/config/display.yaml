# =============================================================================
# CONFIG: DISPLAY & SCREENSAVER
# =============================================================================
# User-configurable temperature entity bindings and screensaver settings.
# All values persist across reboots and are editable via the webserver v3 UI.
# =============================================================================

switch:
  - platform: template
    name: "Indoor Temp Enable"
    internal: true
    id: indoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:home-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: 'update_temp_label(id(temperatures), id(main_page)->obj, true, id(outdoor_temp_enable).state);'
    on_turn_off:
      - lambda: 'update_temp_label(id(temperatures), id(main_page)->obj, false, id(outdoor_temp_enable).state);'

  - platform: template
    name: "Outdoor Temp Enable"
    internal: true
    id: outdoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:sun-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: 'update_temp_label(id(temperatures), id(main_page)->obj, true, id(indoor_temp_enable).state);'
    on_turn_off:
      - lambda: 'update_temp_label(id(temperatures), id(main_page)->obj, false, id(indoor_temp_enable).state);'

  - platform: template
    name: "Screen Saver: Clock"
    internal: true
    id: clock_screensaver_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:clock-outline"
    entity_category: config
    web_server:
      sorting_group_id: sg_screensaver
    on_turn_on:
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check
    on_turn_off:
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check

text:
  - platform: template
    name: "Indoor Temp Entity"
    internal: true
    id: indoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:home-thermometer"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Outdoor Temp Entity"
    internal: true
    id: outdoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:sun-thermometer"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Screensaver Mode"
    internal: true
    id: screensaver_mode
    optimistic: true
    restore_value: true
    initial_value: "disabled"
    min_length: 0
    max_length: 10
    mode: text
    entity_category: config
    icon: "mdi:timer-cog-outline"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
            then:
              - script.execute: screensaver_idle_check

  # Optional presence sensor for screensaver (e.g. mmWave)
  - platform: template
    name: "Presence Sensor Entity"
    internal: true
    id: presence_sensor_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:motion-sensor"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver

number:
  - platform: template
    name: "Screen Saver: Daytime Clock Brightness"
    internal: true
    id: clock_brightness_day
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 35
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-7"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(is_clock_showing);'
            then:
              - script.execute: clock_screensaver_refresh_brightness

  - platform: template
    name: "Screen Saver: Nighttime Clock Brightness"
    internal: true
    id: clock_brightness_night
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 35
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-4"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(is_clock_showing);'
            then:
              - script.execute: clock_screensaver_refresh_brightness

  # Legacy setting kept so existing panels can migrate their saved single
  # clock brightness into the new day/night settings, and so older cached web
  # UIs still change the live screensaver brightness.
  - platform: template
    name: "Screen Saver: Clock Brightness"
    internal: true
    id: clock_brightness
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 35
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:clock-outline"
    on_value:
      then:
        - lambda: |-
            float legacy_pct = id(clock_brightness).state;
            if (std::isnan(legacy_pct) || legacy_pct <= 0.0f) legacy_pct = 35.0f;
            if (legacy_pct < 1.0f) legacy_pct = 1.0f;
            if (legacy_pct > 100.0f) legacy_pct = 100.0f;

            auto day_call = id(clock_brightness_day).make_call();
            day_call.set_value(legacy_pct);
            day_call.perform();

            auto night_call = id(clock_brightness_night).make_call();
            night_call.set_value(legacy_pct);
            night_call.perform();

  # Screensaver idle timeout
  - platform: template
    name: "Screensaver Timeout"
    internal: true
    id: screensaver_timeout
    min_value: 10
    max_value: 3600
    step: 10
    initial_value: 1800
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    entity_category: config
    icon: "mdi:timer-outline"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
            then:
              - script.execute: screensaver_idle_check

  # Home screen return timeout (0 = disabled)
  - platform: template
    name: "Home Screen Timeout"
    internal: true
    id: home_screen_timeout
    min_value: 0
    max_value: 300
    step: 1
    initial_value: 60
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    entity_category: config
    icon: "mdi:home-clock"
    web_server:
      sorting_group_id: sg_screensaver
