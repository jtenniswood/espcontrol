# =============================================================================
# CONFIG: DISPLAY & SCREENSAVER
# =============================================================================
# User-configurable temperature entity bindings and screensaver settings.
# All values persist across reboots and are editable via the webserver v3 UI.
# =============================================================================

switch:
  - platform: template
    name: "Indoor Temp Enable"
    internal: true
    id: indoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:home-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: |-
          if (lv_scr_act() == id(main_page)->obj) {
            lv_obj_clear_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);
          }
          bool labeled = id(temperature_display).current_option() == "Labeled";
          if (id(outdoor_temp_enable).state) {
            lv_label_set_text(id(temperatures), labeled ? "Out -° / In -°" : "-° / -°");
          } else {
            lv_label_set_text(id(temperatures), labeled ? "In -°" : "-°");
          }
    on_turn_off:
      - if:
          condition:
            switch.is_off: outdoor_temp_enable
          then:
            - lambda: 'lv_obj_add_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);'
          else:
            - lambda: |-
                bool labeled = id(temperature_display).current_option() == "Labeled";
                lv_label_set_text(id(temperatures), labeled ? "Out -°" : "-°");

  - platform: template
    name: "Outdoor Temp Enable"
    internal: true
    id: outdoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:sun-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: |-
          if (lv_scr_act() == id(main_page)->obj) {
            lv_obj_clear_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);
          }
          bool labeled = id(temperature_display).current_option() == "Labeled";
          if (id(indoor_temp_enable).state) {
            lv_label_set_text(id(temperatures), labeled ? "Out -° / In -°" : "-° / -°");
          } else {
            lv_label_set_text(id(temperatures), labeled ? "Out -°" : "-°");
          }
    on_turn_off:
      - if:
          condition:
            switch.is_off: indoor_temp_enable
          then:
            - lambda: 'lv_obj_add_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);'
          else:
            - lambda: |-
                bool labeled = id(temperature_display).current_option() == "Labeled";
                lv_label_set_text(id(temperatures), labeled ? "In -°" : "-°");

select:
  - platform: template
    name: "Temperature Display"
    internal: true
    id: temperature_display
    optimistic: true
    restore_value: true
    initial_option: "Compact"
    options:
      - "Compact"
      - "Labeled"
    entity_category: config
    icon: "mdi:format-list-bulleted"
    web_server:
      sorting_group_id: sg_display
    set_action:
      - lambda: |-
          bool labeled = x == "Labeled";
          bool indoor_on = id(indoor_temp_enable).state;
          bool outdoor_on = id(outdoor_temp_enable).state;
          if (indoor_on && outdoor_on) {
            lv_label_set_text(id(temperatures), labeled ? "Out -° / In -°" : "-° / -°");
          } else if (outdoor_on) {
            lv_label_set_text(id(temperatures), labeled ? "Out -°" : "-°");
          } else if (indoor_on) {
            lv_label_set_text(id(temperatures), labeled ? "In -°" : "-°");
          }

text:
  - platform: template
    name: "Indoor Temp Entity"
    internal: true
    id: indoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:home-thermometer"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Outdoor Temp Entity"
    internal: true
    id: outdoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:sun-thermometer"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  # Optional presence sensor for screensaver (e.g. mmWave)
  - platform: template
    name: "Presence Sensor Entity"
    internal: true
    id: presence_sensor_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:motion-sensor"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver

number:
  # Screensaver idle timeout
  - platform: template
    name: "Screensaver Timeout"
    internal: true
    id: screensaver_timeout
    min_value: 30
    max_value: 1800
    step: 30
    initial_value: 1800
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    entity_category: config
    icon: "mdi:timer-outline"
    web_server:
      sorting_group_id: sg_screensaver

  # Home screen return timeout (0 = disabled)
  - platform: template
    name: "Home Screen Timeout"
    internal: true
    id: home_screen_timeout
    min_value: 0
    max_value: 300
    step: 1
    initial_value: 60
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    entity_category: config
    icon: "mdi:home-clock"
    web_server:
      sorting_group_id: sg_screensaver
