# =============================================================================
# CONFIG: BUTTON TEMPLATE (parameterized by ${num})
# =============================================================================
# Per-button entity binding, label, and icon. Included once per button slot
# from packages.yaml with vars: { num: "N" }.
# =============================================================================

text:
  - platform: template
    name: "Button ${num} Entity"
    internal: true
    id: button_${num}_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:link-variant"
    web_server:
      sorting_group_id: sg_button

  - platform: template
    name: "Button ${num} Label"
    internal: true
    id: button_${num}_label
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 30
    mode: text
    entity_category: config
    icon: "mdi:label-outline"
    web_server:
      sorting_group_id: sg_button

  - platform: template
    name: "Button ${num} Sensor"
    internal: true
    id: button_${num}_sensor
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:gauge"
    web_server:
      sorting_group_id: sg_button

  - platform: template
    name: "Button ${num} Sensor Unit"
