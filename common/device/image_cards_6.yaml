  - url: "https://placehold.co/1x1/000000/000000.jpg"
    id: image_card_modal_download_1
    format: AUTO
    type: RGB565
    byte_order: LITTLE_ENDIAN
    resize: 1x1
    resize_mode: COVER
    priority: MODAL
    buffer_size: 8192
    allow_insecure_local_urls: true
    p4_pipeline: MODAL

interval:
  - interval: 250ms
    then:
      - lambda: |-
          if (espcontrol::power_mode_defer_display_work(
                id(power_mode_battery_saver) ? espcontrol::PowerMode::BATTERY_SAVER
                                             : espcontrol::PowerMode::NORMAL,
                id(display_mode_controller).current_mode_is(
                    espcontrol::DisplayMode::DISPLAY_OFF))) {
            id(battery_image_refresh_deferred) = true;
            return;
          }
          if (id(battery_image_refresh_deferred)) {
            id(battery_image_refresh_deferred) = false;
            refresh_image_cards();
            return;
          }
          image_card_refresh_due();
