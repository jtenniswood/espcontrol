obj:
  id: trmnl_tile_${num}
  bg_color: 0x000000
  bg_opa: cover
  border_color: 0xFFFFFF
  border_width: 1
  radius: 18
  shadow_width: 0
  pad_all: 8
  scrollable: false
  clickable: false
  hidden: true
  widgets:
    - label:
        id: trmnl_tile_${num}_icon_label
        text: "\U000F0493"
        text_font: font_trmnl_mdi_26_icons
        text_color: 0xFFFFFF
        align: top_left
    - obj:
        id: trmnl_tile_${num}_sensor_container
        align: top_left
        height: SIZE_CONTENT
        width: SIZE_CONTENT
        clickable: false
        scrollable: false
        bg_opa: TRANSP
        border_width: 0
        pad_all: 0
        hidden: true
        layout:
          type: flex
          flex_flow: row
          flex_align_cross: end
        widgets:
          - label:
              id: trmnl_tile_${num}_value
              text: ""
              text_font: font_trmnl_value_200
              transform_scale: 1.9
              text_color: 0xFFFFFF
              long_mode: dot
          - label:
              id: trmnl_tile_${num}_unit
              text: ""
              text_font: font_trmnl_label_108
              transform_scale: 1.2
              text_color: 0xFFFFFF
              pad_bottom: 8
              hidden: true
    - obj:
        id: trmnl_tile_${num}_track
        align: center
        width: 74%
        height: 8
        clickable: false
        scrollable: false
        bg_color: 0xFFFFFF
        bg_opa: 45%
        border_color: 0xFFFFFF
        border_width: 1
        radius: 4
        pad_all: 1
        hidden: true
        widgets:
          - obj:
              id: trmnl_tile_${num}_track_fill
              align: left_mid
              width: 50%
              height: 100%
              clickable: false
              scrollable: false
              bg_color: 0xFFFFFF
              bg_opa: cover
              border_width: 0
              radius: 3
    - obj:
        id: trmnl_tile_${num}_label_row
        align: bottom_left
        width: 100%
        height: SIZE_CONTENT
        clickable: false
        scrollable: false
        bg_opa: TRANSP
        border_width: 0
        pad_all: 0
        layout:
          type: flex
          flex_flow: row
          flex_align_main: space_between
          flex_align_cross: end
        widgets:
          - label:
              id: trmnl_tile_${num}_label
              text: "Configure"
              text_font: font_trmnl_label_108
              transform_scale: 2.1
              text_color: 0xFFFFFF
              width: 80%
              long_mode: dot
          - label:
              id: trmnl_tile_${num}_badge_label
              text: ""
              text_font: font_trmnl_mdi_header_icons
              text_color: 0xFFFFFF
              hidden: true
