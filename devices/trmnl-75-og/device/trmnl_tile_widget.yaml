obj:
  id: trmnl_tile_${num}
  bg_color: 0xFFFFFF
  bg_opa: cover
  border_color: 0x000000
  border_width: 1
  radius: 6
  shadow_width: 0
  pad_all: 8
  scrollable: false
  clickable: false
  widgets:
    - obj:
        id: trmnl_tile_${num}_sensor_container
        align: top_left
        height: SIZE_CONTENT
        width: 100%
        clickable: false
        scrollable: false
        bg_opa: TRANSP
        border_width: 0
        pad_all: 0
        layout:
          type: flex
          flex_flow: row
          flex_align_cross: end
        widgets:
          - label:
              id: trmnl_tile_${num}_value
              text: ""
              text_font: font_trmnl_value_24
              text_color: 0x000000
              long_mode: dot
              width: 75%
          - label:
              id: trmnl_tile_${num}_unit
              text: ""
              text_font: font_trmnl_label_14
              text_color: 0x000000
              pad_bottom: 3
              hidden: true
    - label:
        id: trmnl_tile_${num}_label
        text: "Configure"
        text_font: font_trmnl_label_14
        text_color: 0x000000
        align: bottom_left
        width: 100%
        long_mode: wrap
