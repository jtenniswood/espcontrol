# =============================================================================
# SENSORS - TRMNL e-paper dashboard config subscriptions
# =============================================================================

script:
  - id: trmnl_bind_lvgl_widgets
    then:
      - lambda: |-
          lv_label_set_text(id(trmnl_wifi_setup_ssid), wifi::global_wifi_component->get_ap().get_ssid().c_str());
          espcontrol::epaper_dashboard_bind_lvgl_slot(0, id(trmnl_tile_1), id(trmnl_tile_1_icon_label), id(trmnl_tile_1_sensor_container), id(trmnl_tile_1_label), id(trmnl_tile_1_value), id(trmnl_tile_1_unit), id(trmnl_tile_1_badge_label), id(trmnl_tile_1_track), id(trmnl_tile_1_track_fill));
          espcontrol::epaper_dashboard_bind_lvgl_slot(1, id(trmnl_tile_2), id(trmnl_tile_2_icon_label), id(trmnl_tile_2_sensor_container), id(trmnl_tile_2_label), id(trmnl_tile_2_value), id(trmnl_tile_2_unit), id(trmnl_tile_2_badge_label), id(trmnl_tile_2_track), id(trmnl_tile_2_track_fill));
          espcontrol::epaper_dashboard_bind_lvgl_slot(2, id(trmnl_tile_3), id(trmnl_tile_3_icon_label), id(trmnl_tile_3_sensor_container), id(trmnl_tile_3_label), id(trmnl_tile_3_value), id(trmnl_tile_3_unit), id(trmnl_tile_3_badge_label), id(trmnl_tile_3_track), id(trmnl_tile_3_track_fill));
          espcontrol::epaper_dashboard_bind_lvgl_slot(3, id(trmnl_tile_4), id(trmnl_tile_4_icon_label), id(trmnl_tile_4_sensor_container), id(trmnl_tile_4_label), id(trmnl_tile_4_value), id(trmnl_tile_4_unit), id(trmnl_tile_4_badge_label), id(trmnl_tile_4_track), id(trmnl_tile_4_track_fill));
          espcontrol::epaper_dashboard_bind_lvgl_slot(4, id(trmnl_tile_5), id(trmnl_tile_5_icon_label), id(trmnl_tile_5_sensor_container), id(trmnl_tile_5_label), id(trmnl_tile_5_value), id(trmnl_tile_5_unit), id(trmnl_tile_5_badge_label), id(trmnl_tile_5_track), id(trmnl_tile_5_track_fill));
          espcontrol::epaper_dashboard_bind_lvgl_slot(5, id(trmnl_tile_6), id(trmnl_tile_6_icon_label), id(trmnl_tile_6_sensor_container), id(trmnl_tile_6_label), id(trmnl_tile_6_value), id(trmnl_tile_6_unit), id(trmnl_tile_6_badge_label), id(trmnl_tile_6_track), id(trmnl_tile_6_track_fill));
          espcontrol::epaper_dashboard_bind_lvgl_slot(6, id(trmnl_tile_7), id(trmnl_tile_7_icon_label), id(trmnl_tile_7_sensor_container), id(trmnl_tile_7_label), id(trmnl_tile_7_value), id(trmnl_tile_7_unit), id(trmnl_tile_7_badge_label), id(trmnl_tile_7_track), id(trmnl_tile_7_track_fill));
          espcontrol::epaper_dashboard_bind_lvgl_slot(7, id(trmnl_tile_8), id(trmnl_tile_8_icon_label), id(trmnl_tile_8_sensor_container), id(trmnl_tile_8_label), id(trmnl_tile_8_value), id(trmnl_tile_8_unit), id(trmnl_tile_8_badge_label), id(trmnl_tile_8_track), id(trmnl_tile_8_track_fill));
          espcontrol::epaper_dashboard_bind_lvgl_slot(8, id(trmnl_tile_9), id(trmnl_tile_9_icon_label), id(trmnl_tile_9_sensor_container), id(trmnl_tile_9_label), id(trmnl_tile_9_value), id(trmnl_tile_9_unit), id(trmnl_tile_9_badge_label), id(trmnl_tile_9_track), id(trmnl_tile_9_track_fill));
          espcontrol::epaper_dashboard_bind_lvgl_slot(9, id(trmnl_tile_10), id(trmnl_tile_10_icon_label), id(trmnl_tile_10_sensor_container), id(trmnl_tile_10_label), id(trmnl_tile_10_value), id(trmnl_tile_10_unit), id(trmnl_tile_10_badge_label), id(trmnl_tile_10_track), id(trmnl_tile_10_track_fill));
          espcontrol::epaper_dashboard_bind_lvgl_slot(10, id(trmnl_tile_11), id(trmnl_tile_11_icon_label), id(trmnl_tile_11_sensor_container), id(trmnl_tile_11_label), id(trmnl_tile_11_value), id(trmnl_tile_11_unit), id(trmnl_tile_11_badge_label), id(trmnl_tile_11_track), id(trmnl_tile_11_track_fill));
          espcontrol::epaper_dashboard_bind_lvgl_slot(11, id(trmnl_tile_12), id(trmnl_tile_12_icon_label), id(trmnl_tile_12_sensor_container), id(trmnl_tile_12_label), id(trmnl_tile_12_value), id(trmnl_tile_12_unit), id(trmnl_tile_12_badge_label), id(trmnl_tile_12_track), id(trmnl_tile_12_track_fill));

  - id: trmnl_update_clock_bar
    then:
      - lambda: |-
          auto now = id(trmnl_time).now();
          if (now.is_valid()) {
            char time_text[6];
            snprintf(time_text, sizeof(time_text), "%02d:%02d", now.hour, now.minute);
            lv_label_set_text(id(display_time), time_text);
            espcontrol::epaper_dashboard_set_time(
              true, now.year, now.month, now.day_of_month,
              now.hour, now.minute, now.timestamp, "UTC (GMT+0)", false);
          } else {
            lv_label_set_text(id(display_time), "--:--");
            espcontrol::epaper_dashboard_set_time(
              false, 0, 0, 0, 0, 0, 0, "UTC (GMT+0)", false);
          }
          lv_label_set_text(id(network_status_icon_label), "\U000F0928");

  - id: trmnl_sync_temperature_config
    mode: restart
    then:
      - lambda: |-
          espcontrol::epaper_dashboard_configure_temperatures(
            id(indoor_temp_enable).state,
            id(outdoor_temp_enable).state,
            id(indoor_temp_entity).state,
            id(outdoor_temp_entity).state,
            id(temperature_unit_select).current_option(),
            "UTC (GMT+0)",
            id(temperature_degree_symbol_enabled).state,
            id(temperatures),
            id(main_page)->obj,
            &id(indoor_temp),
            &id(outdoor_temp));

  - id: trmnl_refresh_display
    mode: restart
    then:
      - script.execute: trmnl_update_clock_bar
      - lambda: |-
          bool dark = id(screen_theme).current_option() == "Dark";
          // The TRMNL Waveshare panel renders LVGL black/white inverted, so send
          // the opposite framebuffer theme while preserving the selected theme.
          bool framebuffer_dark = !dark;
          espcontrol::epaper_dashboard_set_dark_theme(framebuffer_dark);
          lv_color_t bg = lv_color_hex(framebuffer_dark ? 0x000000 : 0xFFFFFF);
          lv_color_t fg = lv_color_hex(framebuffer_dark ? 0xFFFFFF : 0x000000);
          lv_obj_set_style_bg_color(lv_scr_act(), bg, LV_PART_MAIN);
          lv_obj_set_style_bg_opa(lv_scr_act(), LV_OPA_COVER, LV_PART_MAIN);
          lv_obj_set_style_bg_color(id(main_page)->obj, bg, LV_PART_MAIN);
          lv_obj_set_style_bg_opa(id(main_page)->obj, LV_OPA_COVER, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(temperatures), fg, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(display_time), fg, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(network_status_icon_label), fg, LV_PART_MAIN);
          espcontrol::epaper_dashboard_update_lvgl_page(id(trmnl_current_page));
          id(trmnl_rendered_dark_theme) = dark;
          if (id(trmnl_force_full_refresh)) {
            id(epaper).set_full_update_every(1);
          } else {
            id(epaper).set_full_update_every(30);
          }
      - delay: 250ms
      - component.update: epaper
      - lambda: |-
          id(epaper).set_full_update_every(30);
          id(trmnl_force_full_refresh) = false;

  - id: trmnl_refresh_display_full
    mode: restart
    then:
      - lambda: |-
          id(trmnl_force_full_refresh) = true;
      - script.execute: trmnl_refresh_display

  - id: trmnl_refresh_display_partial
    mode: restart
    then:
      - lambda: |-
          id(trmnl_force_full_refresh) = false;
      - script.execute: trmnl_refresh_display

  - id: trmnl_sync_dashboard_config
    then:
      - script.execute: trmnl_bind_lvgl_widgets
      - script.execute: trmnl_sync_temperature_config
      - lambda: |-
          // BEGIN GENERATED TRMNL DASHBOARD CONFIG
          // Generated from devices/manifest.json plan: 1 page x 12 slots.
          espcontrol::epaper_dashboard_set_config(0, id(button_1_config).state);
          espcontrol::epaper_dashboard_set_config(1, id(button_2_config).state);
          espcontrol::epaper_dashboard_set_config(2, id(button_3_config).state);
          espcontrol::epaper_dashboard_set_config(3, id(button_4_config).state);
          espcontrol::epaper_dashboard_set_config(4, id(button_5_config).state);
          espcontrol::epaper_dashboard_set_config(5, id(button_6_config).state);
          espcontrol::epaper_dashboard_set_config(6, id(button_7_config).state);
          espcontrol::epaper_dashboard_set_config(7, id(button_8_config).state);
          espcontrol::epaper_dashboard_set_config(8, id(button_9_config).state);
          espcontrol::epaper_dashboard_set_config(9, id(button_10_config).state);
          espcontrol::epaper_dashboard_set_config(10, id(button_11_config).state);
          espcontrol::epaper_dashboard_set_config(11, id(button_12_config).state);
          // END GENERATED TRMNL DASHBOARD CONFIG
          espcontrol::epaper_dashboard_refresh_weather_forecasts();

switch:
  - platform: template
    name: "${entity_indoor_temp_enable}"
    internal: true
    id: indoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:home-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: trmnl_sync_temperature_config
      - script.execute: trmnl_refresh_display_partial
    on_turn_off:
      - script.execute: trmnl_sync_temperature_config
      - script.execute: trmnl_refresh_display_partial

  - platform: template
    name: "${entity_outdoor_temp_enable}"
    internal: true
    id: outdoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:sun-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: trmnl_sync_temperature_config
      - script.execute: trmnl_refresh_display_partial
    on_turn_off:
      - script.execute: trmnl_sync_temperature_config
      - script.execute: trmnl_refresh_display_partial

  - platform: template
    name: "${entity_screen_temperature_degree_symbol}"
    internal: true
    id: temperature_degree_symbol_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    icon: "mdi:temperature-celsius"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: trmnl_sync_temperature_config
      - script.execute: trmnl_refresh_display_partial
    on_turn_off:
      - script.execute: trmnl_sync_temperature_config
      - script.execute: trmnl_refresh_display_partial

select:
  - platform: template
    name: "${entity_screen_temperature_unit}"
    internal: true
    disabled_by_default: true
    id: temperature_unit_select
    entity_category: config
    icon: "mdi:temperature-celsius"
    optimistic: true
    restore_value: true
    initial_option: "Auto"
    options:
      - "Auto"
      - "°C"
      - "°F"
    web_server:
      sorting_group_id: sg_display
    on_value:
      then:
        - script.execute: trmnl_sync_temperature_config
        - script.execute: trmnl_refresh_display_partial

text:
  - platform: template
    name: "${entity_indoor_temp_entity}"
    internal: true
    id: indoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:home-thermometer"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "${entity_outdoor_temp_entity}"
    internal: true
    id: outdoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:sun-thermometer"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

interval:
  - interval: 1min
    then:
      - script.execute: trmnl_refresh_display_partial

  - interval: 45s
    then:
      - if:
          condition:
            lambda: "return espcontrol::epaper_dashboard_is_dirty();"
          then:
            - script.execute: trmnl_refresh_display_partial

  - interval: 5s
    then:
      - if:
          condition:
            lambda: "return id(trmnl_rendered_dark_theme) != (id(screen_theme).current_option() == \"Dark\");"
          then:
            - script.execute: trmnl_refresh_display_full

  - interval: 30min
    then:
      - lambda: |-
          espcontrol::epaper_dashboard_refresh_weather_forecasts();
      - script.execute: trmnl_refresh_display_full
