# =============================================================================
# FONTS - Generic style IDs for the 480x800 display
# =============================================================================
# Feature YAML should reference these functional style IDs, not physical font
# names or sizes. Sizes remain device-specific behind the same style names.
# =============================================================================

font:
  # Main action/setup icons
  - file: '${mdi_font_file}'
    id: font_icon_main
    size: 62
    bpp: 4
    glyphs: !include ../../../common/assets/icon_glyphs.yaml

  # Smaller card icons
  - file: '${mdi_font_file}'
    id: font_icon_card
    size: 47
    bpp: 4
    glyphs: !include ../../../common/assets/climate_card_icon_glyphs.yaml

  # Status, network, and subpage icons
  - file: '${mdi_font_file}'
    id: font_icon_status
    size: 27
    bpp: 4
    glyphs: !include ../../../common/assets/network_status_glyphs.yaml

  # Main labels and setup body text
  - file: "gfonts://Roboto"
    id: font_text_body
    size: 29
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Smaller secondary text
  - file: "gfonts://Roboto"
    id: font_text_small
    size: 25
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Headings and media titles
  - file: "gfonts://Roboto@Light"
    id: font_text_title
    size: 56
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Media cover-art screensaver title
  - file: "gfonts://Roboto@Light"
    id: font_cover_art_title
    size: 59
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Media cover-art screensaver artist
  - file: "gfonts://Roboto@Light"
    id: font_cover_art_artist
    size: 40
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Media cover-art screensaver elapsed time
  - file: "gfonts://Roboto"
    id: font_cover_art_time
    size: 24
    bpp: 4
    glyphs: " 0123456789:/-"

  # Normal sensor values
  - file: "gfonts://Roboto@Light"
    id: font_number_value
    size: 62
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"
      - " dhms"

  # Large sensor values
  - file: "gfonts://Roboto@Thin"
    id: font_number_value_large
    size: 155
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"

  # Agenda card/overlay event titles (medium weight, Calendar-Card-Pro-style)
  - file: "gfonts://Roboto@Medium"
    id: font_agenda_title
    size: 26
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Medium"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Agenda times, locations, and day headings
  - file: "gfonts://Roboto"
    id: font_agenda_secondary
    size: 22
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Agenda date-column day number (digits only)
  - file: "gfonts://Roboto@Light"
    id: font_agenda_day
    size: 32
    bpp: 4
    glyphs: "0123456789"

  # Agenda date-column weekday/month (uppercase only)
  - file: "gfonts://Roboto"
    id: font_agenda_date_small
    size: 16
    bpp: 4
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZ"

  # Agenda inline row icons (clock beside times, pin beside locations)
  - file: '${mdi_font_file}'
    id: font_agenda_icon
    size: 22
    bpp: 4
    glyphs:
      - "\U000F0150"  # mdi-clock-outline
      - "\U000F07D9"  # mdi-map-marker-outline
