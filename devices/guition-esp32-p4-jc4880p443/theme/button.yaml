# =============================================================================
# THEME: BUTTON - Sizing, colors, and LVGL style for control buttons
# =============================================================================
# Default substitutions for button dimensions and colors, plus the LVGL
# style definition and theme overrides applied to all buttons on the
# main page. The "checked" state reflects an entity that is currently on.
# =============================================================================

# ---------------------------------------------------------------------------
# Substitutions (sizing and color defaults used by button_widget.yaml)
# ---------------------------------------------------------------------------
substitutions:
  icon_font: icon_font
  # Per-channel gain for warm correction (tune to taste for this panel)
  color_r_gain: "1.06"
  color_g_gain: "1.00"
  color_b_gain: "0.85"
  # Pre-computed warmed static colors
  warm_white: "0xFFFFD9"
  warm_gray: "0x908874"
  button_on_color: "0xFF8C00"
  button_text_color: "0xFFFFD9"
  button_control_color: "0x33312A"
  button_height: 142px
  button_width: 150px
  padding: 14px
  radius: 8px

lvgl:
  # ---------------------------------------------------------------------------
  # Style: "control" (applied to each button via styles: control)
  # ---------------------------------------------------------------------------
  style_definitions:
    - id: control
      bg_color: $button_control_color

  # ---------------------------------------------------------------------------
  # Theme: global button defaults and checked (on) state
  # ---------------------------------------------------------------------------
  theme:
    button:
      text_font: label_font
      scroll_on_focus: false
      radius: $radius
      width: $button_width
      height: $button_height
      pad_all: $padding
      shadow_width: 0
      text_color: $button_text_color
      checked:
        bg_color: $button_on_color
        text_color: $button_text_color
