# =============================================================================
# ESPHOME ENTRY POINT - JC3248W535 ESP32-S3 (3.2" 320x480 portrait)
# =============================================================================
# User-facing config file. Set your device name and WiFi credentials here.
# The remote package reference pulls in the full device configuration from
# GitHub so the device stays up-to-date automatically.
# =============================================================================

# ---------------------------------------------------------------------------
# Device identity
# ---------------------------------------------------------------------------
substitutions:
  name: "your-device-name"
  friendly_name: "Your Device Name"

# ---------------------------------------------------------------------------
# WiFi credentials (stored in secrets.yaml)
# ---------------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# ---------------------------------------------------------------------------
# Remote package (pulls full config from GitHub)
# ---------------------------------------------------------------------------
packages:
  setup:
    url: https://github.com/jtenniswood/espcontrol/
    file: devices/jc3248w535/packages.yaml
    refresh: 1s
