# =============================================================================
# DEVICE - JC3248W535 ESP32-S3 hardware definition
# =============================================================================
# Pin assignments, peripherals, and platform config for the 3.2" portrait
# panel. Includes the ESP32-S3 SoC (native WiFi), MIPI SPI display (320x480),
# AXS15231 capacitive touchscreen, and backlight PWM.
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/jtenniswood/espcontrol"
  espcontrol_component_ref: "main"

# ---------------------------------------------------------------------------
# ESP32-S3 platform (16MB flash, ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    version: 5.5.2
    source: https://github.com/pioarduino/esp-idf/releases/download/v5.5.2/esp-idf-v5.5.2.tar.xz
    platform_version: 55.03.37
    sdkconfig_options:
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "8"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      COMPILER_OPTIMIZATION_SIZE: "y"
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"

# ---------------------------------------------------------------------------
# External component
# ---------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol, web_server_idf, artwork_image]
    refresh: 1s

espcontrol:

# ---------------------------------------------------------------------------
# ESPHome core (device name from substitutions)
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: -100
      then:
        - lambda: 'id(screen_rotation_ready) = true;'
        - script.execute: apply_screen_rotation

# ---------------------------------------------------------------------------
# PSRAM (video frame buffer memory)
# ---------------------------------------------------------------------------
psram:
  mode: octal
  speed: 80MHz

# ---------------------------------------------------------------------------
# OTA updates (ESPHome native + HTTP-based)
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
  - platform: http_request

# ---------------------------------------------------------------------------
# Shared infrastructure (API, logging, web server, restart button)
# ---------------------------------------------------------------------------
packages:
  core_infra: !include ../../../common/device/core_infra.yaml

api:
  listen_backlog: 2
  max_connections: 2
  max_send_queue: 4

wifi:
  use_psram: true

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM output + monochromatic light entity)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO1
    id: gpio_backlight_pwm
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                return id(screen_schedule_asleep) ||
                       (id(schedule_enabled).state && !panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now()).is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: 'return id(screensaver_display_off_active);'
                  then:
                    - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# SPI bus (quad SPI for MIPI SPI display)
# ---------------------------------------------------------------------------
spi:
  - id: quad_spi
    type: quad
    clk_pin: 47
    data_pins: [21, 48, 40, 39]

# ---------------------------------------------------------------------------
# I2C bus and touchscreen (AXS15231, wakes screensaver on touch)
# ---------------------------------------------------------------------------
i2c:
  sda: 4
  scl: 8

touchscreen:
  - platform: axs15231
    id: my_touchscreen
    display: my_display
    # Adjust transform if touch orientation does not match display.
    # For display rotation other than 0, you may need swap_xy: true.
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    on_touch:
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Display (3.2" 320x480 MIPI SPI panel, portrait orientation)
# ---------------------------------------------------------------------------
display:
  - platform: mipi_spi
    model: JC3248W535
    id: my_display
    # Start WiFi before the MIPI SPI panel allocates its PSRAM frame buffers;
    # otherwise the WiFi driver can fail to claim enough internal RX buffers.
    setup_priority: 240
    data_rate: 40MHz
    update_interval: never
    auto_clear_enabled: False

# ---------------------------------------------------------------------------
# LVGL base (display binding, must be before any page definitions)
# ---------------------------------------------------------------------------
lvgl:
  id: main_lvgl
  setup_priority: 230
  buffer_size: 25%
  displays: my_display
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

script:
  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "90";'
          then:
            - lvgl.display.set_rotation: 90
          else:
            - if:
                condition:
                  lambda: 'return id(screen_rotation_select).current_option() == "180";'
                then:
                  - lvgl.display.set_rotation: 180
                else:
                  - if:
                      condition:
                        lambda: 'return id(screen_rotation_select).current_option() == "270";'
                      then:
                        - lvgl.display.set_rotation: 270
                      else:
                        - lvgl.display.set_rotation: 0

select:
  - platform: template
    name: "Screen: Rotation"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "0"
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(screen_rotation_ready);'
            then:
              - script.execute: apply_screen_rotation
