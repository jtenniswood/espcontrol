# =============================================================================
# SENSORS - Dynamic HA entity subscriptions (S3 - 9 buttons, 3×3 grid)
# =============================================================================
# Thin wiring layer: builds id()-based arrays and calls shared C++ functions
# from button_grid.h for all grid layout, HA subscriptions, and subpage logic.
# =============================================================================

globals:
  - id: indoor_temp
    type: float
    initial_value: 'NAN'
  - id: outdoor_temp
    type: float
    initial_value: 'NAN'

api:
  actions:
    - action: update_button
      variables:
        index: int
        entity: string
        label: string
        icon: string
        icon_on: string
        sensor_entity: string
        unit: string
        button_type: string
        precision: string
      then:
        - lambda: |-
            esphome::text::Text *target = nullptr;
            switch (index) {
                    case 1: target = id(button_1_config); break;
                    case 2: target = id(button_2_config); break;
                    case 3: target = id(button_3_config); break;
                    case 4: target = id(button_4_config); break;
                    case 5: target = id(button_5_config); break;
                    case 6: target = id(button_6_config); break;
                    case 7: target = id(button_7_config); break;
                    case 8: target = id(button_8_config); break;
                    case 9: target = id(button_9_config); break;
              default:
                ESP_LOGW("api", "update_button: invalid index %d", index);
                return;
            }

            std::string existing = target->state;
            std::string current[8];
            size_t start = 0;
            for (int i = 0; i < 7; i++) {
              size_t sep = existing.find(';', start);
              if (sep == std::string::npos) {
                current[i] = existing.substr(start);
                start = existing.size();
              } else {
                current[i] = existing.substr(start, sep - start);
                start = sep + 1;
              }
            }
            current[7] = (start <= existing.size()) ? existing.substr(start) : "";

            auto merge_field = [](const std::string &incoming, const std::string &stored) -> std::string {
              if (incoming.empty() || incoming == "null" || incoming == "NULL" || incoming == "undefined" || incoming == "__KEEP__") return stored;
              if (incoming == "__EMPTY__") return "";
              return incoming;
            };

            std::string merged[8];
            merged[0] = merge_field(entity, current[0]);
            merged[1] = merge_field(label, current[1]);
            merged[2] = merge_field(icon, current[2]);
            merged[3] = merge_field(icon_on, current[3]);
            merged[4] = merge_field(sensor_entity, current[4]);
            merged[5] = merge_field(unit, current[5]);
            merged[6] = merge_field(button_type, current[6]);
            merged[7] = merge_field(precision, current[7]);

            std::string cfg = merged[0] + ";" + merged[1] + ";" + merged[2] + ";" +
              merged[3] + ";" + merged[4] + ";" + merged[5] + ";" + merged[6] + ";" + merged[7];

            auto call = target->make_call();
            call.set_value(cfg);
            call.perform();
        - logger.log:
            level: INFO
            format: "Queued update for button index %d"
            args: [ 'index' ]

    - action: apply_button_updates
      then:
        - button.press: apply_configuration_button

esphome:
  on_boot:
    - priority: -100
      then:
        # Phase 1: Parse config, position buttons, apply colors/icons/labels
        - lambda: |-
            // BEGIN GENERATED PHASE 1 GRID WIRING
            // Generated by scripts/generate_device_slots.py from scripts/device_slots.json.
            #define BTN_SLOT(n) { button_##n##_config, button_##n, button_##n##_icon_label, button_##n##_text_label, button_##n##_sensor_container, button_##n##_sensor_label, button_##n##_unit_label }
            BtnSlot slots[] = {
              BTN_SLOT(1),
              BTN_SLOT(2),
              BTN_SLOT(3),
              BTN_SLOT(4),
              BTN_SLOT(5),
              BTN_SLOT(6),
              BTN_SLOT(7),
              BTN_SLOT(8),
              BTN_SLOT(9),
            };
            #undef BTN_SLOT
            GridConfig cfg = {};
            cfg.num_slots = 9;
            cfg.cols = 3;
            cfg.icon_font = id(icon_font_sm)->get_lv_font();
            cfg.climate_control_icon_font = id(climate_control_icon_font)->get_lv_font();
            cfg.sp_sensor_font = id(statistics_font)->get_lv_font();
            cfg.climate_target_font = id(climate_target_font_sm)->get_lv_font();
            cfg.forecast_font = id(forecast_font_sm)->get_lv_font();
            cfg.forecast_unit_font = id(forecast_unit_font)->get_lv_font();
            cfg.temperature_unit = id(temperature_unit_select).current_option();
            cfg.timezone = id(timezone_select).current_option();
            cfg.developer_experimental_features = id(developer_experimental_features).state;
            // END GENERATED PHASE 1 GRID WIRING
            grid_phase1(slots, cfg,
              id(button_order).state,
              id(button_on_color).state,
              id(button_off_color).state,
              id(sensor_card_color).state);
        - delay: 100ms

        # Phase 2: HA subscriptions + subpage creation
        - lambda: |-
            // BEGIN GENERATED PHASE 2 GRID WIRING
            // Generated by scripts/generate_device_slots.py from scripts/device_slots.json.
            #define BTN_SLOT(n) { button_##n##_config, button_##n, button_##n##_icon_label, button_##n##_text_label, button_##n##_sensor_container, button_##n##_sensor_label, button_##n##_unit_label }
            #define SP_CFG(n) subpage_##n##_config
            #define SP_EXT(n) subpage_##n##_config_ext
            #define SP_EXT2(n) subpage_##n##_config_ext_2
            #define SP_EXT3(n) subpage_##n##_config_ext_3
            BtnSlot slots[] = {
              BTN_SLOT(1),
              BTN_SLOT(2),
              BTN_SLOT(3),
              BTN_SLOT(4),
              BTN_SLOT(5),
              BTN_SLOT(6),
              BTN_SLOT(7),
              BTN_SLOT(8),
              BTN_SLOT(9),
            };
            esphome::text::Text *sp_cfgs[] = {
              SP_CFG(1), SP_CFG(2), SP_CFG(3), SP_CFG(4),
              SP_CFG(5), SP_CFG(6), SP_CFG(7), SP_CFG(8),
              SP_CFG(9),
            };
            esphome::text::Text *sp_ext[] = {
              SP_EXT(1), SP_EXT(2), SP_EXT(3), SP_EXT(4),
              SP_EXT(5), SP_EXT(6), SP_EXT(7), SP_EXT(8),
              SP_EXT(9),
            };
            esphome::text::Text *sp_ext2[] = {
              SP_EXT2(1), SP_EXT2(2), SP_EXT2(3), SP_EXT2(4),
              SP_EXT2(5), SP_EXT2(6), SP_EXT2(7), SP_EXT2(8),
              SP_EXT2(9),
            };
            esphome::text::Text *sp_ext3[] = {
              SP_EXT3(1), SP_EXT3(2), SP_EXT3(3), SP_EXT3(4),
              SP_EXT3(5), SP_EXT3(6), SP_EXT3(7), SP_EXT3(8),
              SP_EXT3(9),
            };
            #undef BTN_SLOT
            #undef SP_CFG
            #undef SP_EXT
            #undef SP_EXT2
            #undef SP_EXT3
            GridConfig cfg = {};
            cfg.num_slots = 9;
            cfg.cols = 3;
            cfg.icon_font = id(icon_font_sm)->get_lv_font();
            cfg.climate_control_icon_font = id(climate_control_icon_font)->get_lv_font();
            cfg.sp_sensor_font = id(statistics_font)->get_lv_font();
            cfg.climate_target_font = id(climate_target_font_sm)->get_lv_font();
            cfg.forecast_font = id(forecast_font_sm)->get_lv_font();
            cfg.forecast_unit_font = id(forecast_unit_font)->get_lv_font();
            cfg.temperature_unit = id(temperature_unit_select).current_option();
            cfg.timezone = id(timezone_select).current_option();
            cfg.developer_experimental_features = id(developer_experimental_features).state;
            // END GENERATED PHASE 2 GRID WIRING
            grid_phase2(slots, cfg, sp_cfgs, sp_ext, sp_ext2, sp_ext3,
              id(button_order).state,
              id(button_on_color).state,
              id(button_off_color).state,
              id(sensor_card_color).state,
              id(main_page)->obj);
        - script.execute: time_update
        - delay: 100ms

        # Phase 3: Temperature + presence subscriptions
        - lambda: |-
            grid_phase3(
              id(indoor_temp_enable).state,
              id(outdoor_temp_enable).state,
              id(indoor_temp_entity).state,
              id(outdoor_temp_entity).state,
              &id(indoor_temp), &id(outdoor_temp),
              id(temperatures),
              id(presence_sensor_entity).state,
              &id(presence_detected),
              []() {
                if (id(screensaver_mode).state == "sensor") id(screensaver_wake).execute();
              },
              []() {
                if (id(screensaver_mode).state == "sensor") id(screensaver_sleep_sensor).execute();
              });
