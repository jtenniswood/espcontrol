# =============================================================================
# BUILD PROFILE - Waveshare ESP32-S3 Touch LCD 7B (7" landscape)
# =============================================================================
# CI/local build entry point. Includes the full device package and adds
# MAC suffix for unique naming. Used by the release workflow; the .factory
# variant bundles the web UI JS inline for initial flash images.
# =============================================================================

substitutions:
  name: "espcontrol-waveshare-7b"
  friendly_name: "EspControl Waveshare 7B"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

esphome:
  name_add_mac_suffix: true

packages:
  espcontrol: !include ../devices/waveshare-esp32-s3-touch-lcd-7b/packages.yaml

wifi:
  ap:
    ssid: "${friendly_name}"

captive_portal:
