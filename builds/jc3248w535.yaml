# =============================================================================
# BUILD PROFILE - JC3248W535 (3.2" portrait ESP32-S3)
# =============================================================================
# CI/local build entry point for the 320x480 portrait ESP32-S3 MIPI SPI panel.
# =============================================================================

substitutions:
  name: "espcontrol-jc3248w535"
  friendly_name: "JC3248W535"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

esphome:
  name_add_mac_suffix: true

packages:
  espcontrol: !include ../devices/jc3248w535/packages.yaml

wifi:
  ap:
    ssid: "${friendly_name}"

captive_portal:
