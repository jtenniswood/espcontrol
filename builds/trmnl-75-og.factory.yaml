# =============================================================================
# FACTORY BUILD - TRMNL 7.5 OG
# =============================================================================

substitutions:
  name: "trmnl-75-og"
  friendly_name: "TRMNL 7.5 OG"
  firmware_version: "0.0.0"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

packages:
  core: !include ../devices/trmnl-75-og/packages.yaml

esphome:
  name_add_mac_suffix: true
  project:
    name: jtenniswood.espcontrol
    version: "${firmware_version}"

dashboard_import:
  package_import_url: github://jtenniswood/espcontrol/devices/trmnl-75-og/esphome.yaml@main

web_server:
  port: 80
  version: 3
  js_url: ""
  js_include: "../docs/public/webserver/trmnl-75-og/www.js"

wifi:
  ap:
    ssid: "${friendly_name}"

captive_portal:
