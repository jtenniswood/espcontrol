name: Build Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing draft release tag to build, verify, and publish
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ESPCONTROL_NPM_CACHE_MAX_MB: 512
  ESPCONTROL_DOCKER_BUILD_CACHE_KEEP: 2GB

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Product Preflight
    runs-on: self-hosted
    outputs:
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - name: Prepare self-hosted workspace
        run: |
          rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?* 2>/dev/null ||
            sudo rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?*

      - uses: actions/checkout@v7.0.1
        with:
          ref: ${{ inputs.release_tag }}
      - run: git sparse-checkout disable || true

      - name: Pin release source revision
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Require private draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: >-
          python3 scripts/firmware_release.py verify-draft
          --version "${RELEASE_TAG}"
          --repo "${GITHUB_REPOSITORY}"

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          NPM_CACHE="${HOME}/.cache/espcontrol-actions/npm"
          mkdir -p "${NPM_CACHE}"
          npm ci --prefer-offline --cache "${NPM_CACHE}"
          bash scripts/prune_actions_cache.sh "${NPM_CACHE}" "${ESPCONTROL_NPM_CACHE_MAX_MB}" --strategy reset

      - name: Run release preflight
        run: npm run check:release-preflight

  device-matrix:
    name: Prepare Device Matrix
    needs: preflight
    runs-on: self-hosted
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Prepare self-hosted workspace
        run: |
          rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?* 2>/dev/null ||
            sudo rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?*

      - uses: actions/checkout@v7.0.1
        with:
          ref: ${{ needs.preflight.outputs.source_sha }}

      - name: Generate device matrix
        id: matrix
        run: |
          MATRIX=$(python3 scripts/device_matrix.py release)
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  build-firmware:
    name: Build ${{ matrix.slug }}
    needs: [preflight, device-matrix]
    runs-on: self-hosted
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJSON(needs.device-matrix.outputs.matrix) }}
    steps:
      - name: Prepare self-hosted workspace
        run: |
          rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?* 2>/dev/null ||
            sudo rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?*

      - uses: actions/checkout@v7.0.1
        with:
          path: espcontrol-${{ matrix.slug }}
          ref: ${{ needs.preflight.outputs.source_sha }}
      - name: Normalize checkout
        working-directory: espcontrol-${{ matrix.slug }}
        run: |
          git sparse-checkout disable || true
          git reset --hard HEAD
          BUILD_FILE="builds/${{ matrix.slug }}.factory.yaml"
          if [ ! -f "${BUILD_FILE}" ]; then
            echo "::error::Expected firmware build file is missing: ${BUILD_FILE}"
            echo "Available build files:"
            find builds -maxdepth 1 -type f -print | sort || true
            exit 1
          fi
          if [ "${{ matrix.recovery }}" = "true" ] &&
             [ ! -f "builds/${{ matrix.slug }}.recovery.yaml" ]; then
            echo "::error::Expected C6 recovery build file is missing: builds/${{ matrix.slug }}.recovery.yaml"
            exit 1
          fi

      - name: Load ESPHome version
        working-directory: espcontrol-${{ matrix.slug }}
        run: cat .github/esphome.env >> "$GITHUB_ENV"

      - name: Select Docker command
        run: |
          if docker info >/dev/null 2>&1; then
            echo "DOCKER=docker" >> "$GITHUB_ENV"
          elif sudo -n docker info >/dev/null 2>&1; then
            echo "DOCKER=sudo docker" >> "$GITHUB_ENV"
          else
            echo "::error::Docker is not available to the self-hosted runner user"
            exit 1
          fi

      - name: Reclaim runner disk
        working-directory: espcontrol-${{ matrix.slug }}
        run: bash scripts/reclaim_actions_disk.sh

      - name: Prepare isolated ESPHome cache
        working-directory: espcontrol-${{ matrix.slug }}
        run: |
          RUN_CACHE_ROOT="${RUNNER_TEMP}/espcontrol-esphome/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.slug }}"
          PLATFORMIO_CACHE="${RUN_CACHE_ROOT}/platformio-${ESPHOME_VERSION}"
          NORMAL_BUILD_CACHE="${RUN_CACHE_ROOT}/build-normal"
          RECOVERY_BUILD_CACHE="${RUN_CACHE_ROOT}/build-recovery"
          BUILD_INPUT_DIR=".firmware-builds"
          rm -rf "${RUN_CACHE_ROOT}"
          mkdir -p "${PLATFORMIO_CACHE}" "${NORMAL_BUILD_CACHE}" "${RECOVERY_BUILD_CACHE}"
          export PLATFORMIO_CACHE
          python3 - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path

          cache_root = Path(os.environ["PLATFORMIO_CACHE"])
          package_roots = [cache_root / "platformio" / "packages", cache_root / "packages"]
          for packages in package_roots:
              if not packages.is_dir():
                  continue
              for metadata in packages.glob("*/.piopm"):
                  try:
                      with metadata.open(encoding="utf-8") as handle:
                          json.load(handle)
                  except Exception as exc:
                      package_dir = metadata.parent
                      print(f"Removing corrupted PlatformIO package cache: {package_dir} ({exc})")
                      shutil.rmtree(package_dir, ignore_errors=True)
          PY
          rm -rf .esphome
          rm -rf "${BUILD_INPUT_DIR}"
          mkdir -p "${BUILD_INPUT_DIR}"
          cp builds/*.yaml "${BUILD_INPUT_DIR}/"
          echo "RUN_CACHE_ROOT=${RUN_CACHE_ROOT}" >> "$GITHUB_ENV"
          echo "PLATFORMIO_CACHE=${PLATFORMIO_CACHE}" >> "$GITHUB_ENV"
          echo "NORMAL_BUILD_CACHE=${NORMAL_BUILD_CACHE}" >> "$GITHUB_ENV"
          echo "RECOVERY_BUILD_CACHE=${RECOVERY_BUILD_CACHE}" >> "$GITHUB_ENV"
          echo "BUILD_INPUT_DIR=${BUILD_INPUT_DIR}" >> "$GITHUB_ENV"

      - name: Prepare verified ESP32-C6 recovery firmware
        if: matrix.recovery
        working-directory: espcontrol-${{ matrix.slug }}
        run: python3 scripts/prepare_c6_firmware.py

      - name: Pull ESPHome image
        working-directory: espcontrol-${{ matrix.slug }}
        run: |
          ESPHOME_IMAGE="ghcr.io/esphome/esphome:${ESPHOME_VERSION}"
          LOCK_FILE="/tmp/espcontrol-esphome-image.lock"
          if command -v flock >/dev/null 2>&1; then
            flock "${LOCK_FILE}" ${DOCKER} pull "${ESPHOME_IMAGE}"
          else
            ${DOCKER} pull "${ESPHOME_IMAGE}"
          fi
          echo "ESPHOME_IMAGE=${ESPHOME_IMAGE}" >> "$GITHUB_ENV"

      - name: Compile firmware
        working-directory: espcontrol-${{ matrix.slug }}
        env:
          VERSION: ${{ inputs.release_tag }}
        run: |
          SOURCE_DIR="${PWD}"
          compile_config() {
            config_file="$1"
            build_cache="$2"
            container=$(${DOCKER} create \
              --user "$(id -u):$(id -g)" \
              -e HOME=/config \
              -e PLATFORMIO_CORE_DIR=/config/.esphome/platformio \
              -e PLATFORMIO_SETTING_ENABLE_TELEMETRY=false \
              -v "${PLATFORMIO_CACHE}:/config/.esphome" \
              -v "${build_cache}:/config/${BUILD_INPUT_DIR}/.esphome" \
              "${ESPHOME_IMAGE}" \
              -s firmware_version "${VERSION}" \
              compile "/config/${BUILD_INPUT_DIR}/${config_file}")
            if ! ${DOCKER} cp "${SOURCE_DIR}/." "${container}:/config"; then
              ${DOCKER} rm -f "${container}" >/dev/null 2>&1 || true
              return 1
            fi
            set +e
            ${DOCKER} start -a "${container}"
            status=$?
            set -e
            ${DOCKER} cp \
              "${container}:/config/${BUILD_INPUT_DIR}/.esphome/build" \
              "${build_cache}/" 2>/dev/null || true
            ${DOCKER} rm -f "${container}" >/dev/null 2>&1 || true
            return "${status}"
          }
          compile_config "${{ matrix.slug }}.factory.yaml" "${NORMAL_BUILD_CACHE}"
          if [ "${{ matrix.recovery }}" = "true" ]; then
            compile_config "${{ matrix.slug }}.recovery.yaml" "${RECOVERY_BUILD_CACHE}"
          fi

      - name: Collect firmware files and generate manifest
        id: firmware
        run: |
          FIRMWARE_FACTORY=$(find "${NORMAL_BUILD_CACHE}/build" -name firmware.factory.bin -print -quit 2>/dev/null || true)
          mkdir -p dist/firmware

          if [ -z "${FIRMWARE_FACTORY}" ] || [ ! -f "${FIRMWARE_FACTORY}" ]; then
            echo "::error::Firmware compilation failed — factory binary not found"
            exit 1
          fi

          BUILD_DIR=$(dirname "${FIRMWARE_FACTORY}")
          cp "${BUILD_DIR}/firmware.factory.bin" dist/firmware/${{ matrix.slug }}.factory.bin
          cp "${BUILD_DIR}/firmware.ota.bin" dist/firmware/${{ matrix.slug }}.ota.bin

          VERSION="${{ inputs.release_tag }}"
          python3 espcontrol-${{ matrix.slug }}/scripts/firmware_release.py manifest \
            --slug "${{ matrix.slug }}" \
            --chip "${{ matrix.chip }}" \
            --version "${VERSION}" \
            --factory "dist/firmware/${{ matrix.slug }}.factory.bin" \
            --ota "dist/firmware/${{ matrix.slug }}.ota.bin" \
            --out "dist/firmware/${{ matrix.slug }}.manifest.json"
          python3 espcontrol-${{ matrix.slug }}/scripts/firmware_release.py verify-files \
            --slug "${{ matrix.slug }}" \
            --version "${VERSION}" \
            --manifest "dist/firmware/${{ matrix.slug }}.manifest.json" \
            --factory "dist/firmware/${{ matrix.slug }}.factory.bin" \
            --ota "dist/firmware/${{ matrix.slug }}.ota.bin"

          if [ "${{ matrix.recovery }}" = "true" ]; then
            RECOVERY_FACTORY=$(find "${RECOVERY_BUILD_CACHE}/build" -name firmware.factory.bin -print -quit 2>/dev/null || true)
            if [ -z "${RECOVERY_FACTORY}" ] || [ ! -f "${RECOVERY_FACTORY}" ]; then
              echo "::error::C6 recovery compilation failed — factory binary not found"
              exit 1
            fi
            cp "${RECOVERY_FACTORY}" "dist/firmware/${{ matrix.slug }}.recovery.bin"
            python3 espcontrol-${{ matrix.slug }}/scripts/firmware_release.py recovery-manifest \
              --slug "${{ matrix.slug }}" \
              --version "${VERSION}" \
              --recovery "dist/firmware/${{ matrix.slug }}.recovery.bin" \
              --out "dist/firmware/${{ matrix.slug }}.recovery.manifest.json"
            python3 espcontrol-${{ matrix.slug }}/scripts/firmware_release.py verify-recovery \
              --slug "${{ matrix.slug }}" \
              --version "${VERSION}" \
              --manifest "dist/firmware/${{ matrix.slug }}.recovery.manifest.json" \
              --recovery "dist/firmware/${{ matrix.slug }}.recovery.bin" \
              --c6-firmware "espcontrol-${{ matrix.slug }}/.firmware-deps/esp32-c6/2.12.9/network_adapter_esp32c6.bin" \
              --normal-factory "dist/firmware/${{ matrix.slug }}.factory.bin" \
              --normal-ota "dist/firmware/${{ matrix.slug }}.ota.bin"
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.slug }}
          path: dist/firmware/

      - name: Clean firmware caches
        if: always()
        working-directory: espcontrol-${{ matrix.slug }}
        run: |
          if [ -z "${RUN_CACHE_ROOT:-}" ] || [ -z "${NORMAL_BUILD_CACHE:-}" ] || [ -z "${PLATFORMIO_CACHE:-}" ]; then
            echo "No firmware cache paths were prepared."
            exit 0
          fi
          rm -rf "${RUN_CACHE_ROOT}"
          bash scripts/reclaim_actions_disk.sh

  assemble-release:
    name: Assemble Verified Distribution
    needs: [preflight, build-firmware]
    runs-on: self-hosted
    steps:
      - name: Prepare self-hosted workspace
        run: |
          rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?* 2>/dev/null ||
            sudo rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?*

      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ needs.preflight.outputs.source_sha }}

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: firmware-*
          merge-multiple: true
          path: dist/firmware

      - name: Generate release notes
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: python3 scripts/release_changelog.py "${RELEASE_TAG}" --output dist/release-notes.md

      - name: Verify complete distribution
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          mapfile -t DEVICE_SLUGS < <(python3 scripts/device_matrix.py release | jq -r '.include[].slug')
          mapfile -t RECOVERY_SLUGS < <(python3 scripts/device_matrix.py release | jq -r '.include[] | select(.recovery) | .slug')
          python3 scripts/firmware_release.py verify-bundle \
            --version "${RELEASE_TAG}" \
            --dir dist/firmware \
            --slugs "${DEVICE_SLUGS[@]}" \
            --recovery-slugs "${RECOVERY_SLUGS[@]}"

      - name: Upload verified release distribution
        uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: dist/

  publish:
    name: Publish Verified Draft
    needs: [preflight, assemble-release]
    runs-on: self-hosted
    steps:
      - name: Prepare self-hosted workspace
        run: |
          rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?* 2>/dev/null ||
            sudo rm -rf "${GITHUB_WORKSPACE:?}/"* "${GITHUB_WORKSPACE:?}/".[!.]* "${GITHUB_WORKSPACE:?}/"..?*

      - uses: actions/checkout@v7.0.1
        with:
          ref: ${{ needs.preflight.outputs.source_sha }}

      - name: Download verified release distribution
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist

      - name: Upload, verify, and publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          mapfile -t DEVICE_SLUGS < <(python3 scripts/device_matrix.py release | jq -r '.include[].slug')
          mapfile -t RECOVERY_SLUGS < <(python3 scripts/device_matrix.py release | jq -r '.include[] | select(.recovery) | .slug')
          python3 scripts/firmware_release.py publish-draft \
            --version "${RELEASE_TAG}" \
            --dir dist/firmware \
            --slugs "${DEVICE_SLUGS[@]}" \
            --recovery-slugs "${RECOVERY_SLUGS[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --notes dist/release-notes.md
