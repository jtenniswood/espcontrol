name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-notes:
    name: Update Release Notes
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build detailed changelog
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: python3 scripts/release_changelog.py "$VERSION" --output "$RUNNER_TEMP/release-notes.md"

      - name: Update GitHub release notes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ github.event.release.tag_name }}
        run: gh release edit "$VERSION" --notes-file "$RUNNER_TEMP/release-notes.md"

  build-firmware:
    name: Build ${{ matrix.slug }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: guition-esp32-p4-jc1060p470
            slug: guition-esp32-p4-jc1060p470
            chip: ESP32-P4
          - device: guition-esp32-p4-jc8012p4a1
            slug: guition-esp32-p4-jc8012p4a1
            chip: ESP32-P4
          - device: guition-esp32-p4-jc4880p443
            slug: guition-esp32-p4-jc4880p443
            chip: ESP32-P4
          - device: esp32-p4-86
            slug: esp32-p4-86
            chip: ESP32-P4
          - device: guition-esp32-s3-4848s040
            slug: guition-esp32-s3-4848s040
            chip: ESP32-S3
    steps:
      - uses: actions/checkout@v6

      - name: Cache ESPHome build
        uses: actions/cache@v5
        with:
          path: builds/.esphome
          key: esphome-${{ matrix.slug }}-${{ hashFiles('builds/*.yaml', 'common/**', 'devices/**') }}
          restore-keys: |
            esphome-${{ matrix.slug }}-

      - name: Compile firmware
        env:
          VERSION: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          python3 scripts/firmware_release.py inject \
            --slug "${{ matrix.slug }}" \
            --version "${VERSION}"

          docker run --rm \
            -v "${PWD}:/config" \
            ghcr.io/esphome/esphome:2026.4.5 \
            compile /config/builds/${{ matrix.slug }}.factory.yaml

      - name: Fix ESPHome cache permissions
        if: always()
        run: |
          if [ -d builds/.esphome ]; then
            sudo chown -R "$USER:$USER" builds/.esphome
            chmod -R u+rwX builds/.esphome
          fi

      - name: Collect firmware files and generate manifest
        id: firmware
        run: |
          BUILD_DIR=$(dirname "$(find builds/.esphome/build -name firmware.factory.bin -print -quit)")
          mkdir -p output

          if [ ! -f "${BUILD_DIR}/firmware.factory.bin" ]; then
            echo "::error::Firmware compilation failed — factory binary not found"
            exit 1
          fi

          sudo cp "${BUILD_DIR}/firmware.factory.bin" output/${{ matrix.slug }}.factory.bin
          sudo cp "${BUILD_DIR}/firmware.bin" output/${{ matrix.slug }}.ota.bin

          VERSION="${{ github.event.release.tag_name || github.ref_name }}"

          python3 scripts/firmware_release.py manifest \
            --slug "${{ matrix.slug }}" \
            --chip "${{ matrix.chip }}" \
            --version "${VERSION}" \
            --factory output/${{ matrix.slug }}.factory.bin \
            --ota output/${{ matrix.slug }}.ota.bin \
            --out output/${{ matrix.slug }}.manifest.json

          python3 scripts/firmware_release.py verify-files \
            --slug "${{ matrix.slug }}" \
            --version "${VERSION}" \
            --manifest output/${{ matrix.slug }}.manifest.json \
            --factory output/${{ matrix.slug }}.factory.bin \
            --ota output/${{ matrix.slug }}.ota.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.slug }}
          path: output/

  publish:
    name: Publish to Release
    if: github.event_name == 'release'
    needs: build-firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            devices/manifest.json
            scripts/firmware_release.py
          sparse-checkout-cone-mode: false

      - name: Set release metadata
        run: |
          echo "VERSION=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
          echo "DEVICE_SLUGS=$(jq -r '.devices | keys | join(" ")' devices/manifest.json)" >> "$GITHUB_ENV"

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: firmware-*
          merge-multiple: true
          path: firmware

      - name: Upload firmware to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.event.release.tag_name }}" firmware/* --clobber

      - name: Verify uploaded release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p published
          gh release download "${VERSION}" \
            --pattern "*.manifest.json" \
            --pattern "*.factory.bin" \
            --pattern "*.ota.bin" \
            --dir published
          python3 scripts/firmware_release.py verify-directory \
            --version "${VERSION}" \
            --dir published \
            --slugs ${DEVICE_SLUGS}
