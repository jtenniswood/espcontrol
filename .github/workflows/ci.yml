name: CI

on:
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'common/**'
      - 'components/**'
      - 'devices/**'
      - 'builds/**'
      - 'src/**'
      - 'scripts/**'
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - 'common/**'
      - 'components/**'
      - 'devices/**'
      - 'builds/**'
      - 'src/**'
      - 'scripts/**'
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate Generated Files
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          mkdir -p "${HOME}/.cache/espcontrol-actions/npm"
          npm ci --prefer-offline --cache "${HOME}/.cache/espcontrol-actions/npm"

      - run: python3 scripts/build.py --check
      - run: python3 scripts/generate_device_slots.py --check
      - run: python3 scripts/check_icon_groups.py
      - run: npm run check:config

  docs:
    name: Build Docs
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          mkdir -p "${HOME}/.cache/espcontrol-actions/npm"
          npm ci --prefer-offline --cache "${HOME}/.cache/espcontrol-actions/npm"

      - run: npm run docs:build

  compile:
    name: Compile Firmware (${{ matrix.slug }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        slug:
          - guition-esp32-p4-jc1060p470
          - guition-esp32-p4-jc4880p443
          - guition-esp32-p4-jc8012p4a1
          - esp32-p4-86
          - guition-esp32-s3-4848s040
    steps:
      - uses: actions/checkout@v6

      - name: Prepare local ESPHome cache
        run: |
          CACHE_DIR="${HOME}/.cache/espcontrol-actions/esphome/ci/${{ matrix.slug }}"
          mkdir -p "${CACHE_DIR}" builds
          rm -rf builds/.esphome
          ln -s "${CACHE_DIR}" builds/.esphome

      - name: Compile firmware
        run: >-
          docker run --rm
          -v "${PWD}:/config"
          -v "${HOME}/.cache/espcontrol-actions:${HOME}/.cache/espcontrol-actions"
          ghcr.io/esphome/esphome:2026.4.3
          compile /config/builds/${{ matrix.slug }}.factory.yaml
