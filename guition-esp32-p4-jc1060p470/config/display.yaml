# =============================================================================
# CONFIG: DISPLAY & SCREENSAVER
# =============================================================================
# User-configurable temperature entity bindings and screensaver settings.
# All values persist across reboots and are editable via the webserver v3 UI.
# =============================================================================

switch:
  - platform: template
    name: "Display: Indoor Temp"
    id: indoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:home-thermometer"
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Display: Outdoor Temp"
    id: outdoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:sun-thermometer"
    web_server:
      sorting_group_id: sg_display

text:
  - platform: template
    name: "Display: Indoor Temp Entity"
    id: indoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:home-thermometer"
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Display: Outdoor Temp Entity"
    id: outdoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:sun-thermometer"
    web_server:
      sorting_group_id: sg_display

  # Optional presence sensor for screensaver (e.g. mmWave)
  - platform: template
    name: "Screensaver: Presence Sensor"
    id: presence_sensor_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:motion-sensor"
    web_server:
      sorting_group_id: sg_screensaver

number:
  # Screensaver idle timeout
  - platform: template
    name: "Screensaver: Timeout"
    id: screensaver_timeout
    min_value: 30
    max_value: 1800
    step: 30
    initial_value: 300
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    entity_category: config
    icon: "mdi:timer-outline"
    web_server:
      sorting_group_id: sg_screensaver
