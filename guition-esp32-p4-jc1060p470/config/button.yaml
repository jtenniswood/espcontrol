# =============================================================================
# CONFIG: BUTTON
# =============================================================================
# User-configurable button entity binding, label, and icon. All values
# persist across reboots and are editable via the webserver v3 UI.
# =============================================================================

text:
  - platform: template
    name: "Button: Entity"
    id: button_1_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:link-variant"
    web_server:
      sorting_group_id: sg_button

  - platform: template
    name: "Button: Label"
    id: button_1_label
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 30
    mode: text
    entity_category: config
    icon: "mdi:label-outline"
    web_server:
      sorting_group_id: sg_button

  - platform: template
    name: "Button: On Color"
    id: button_1_on_color
    optimistic: true
    restore_value: true
    initial_value: "FF8C00"
    min_length: 6
    max_length: 6
    mode: text
    entity_category: config
    icon: "mdi:palette"
    web_server:
      sorting_group_id: sg_button

  - platform: template
    name: "Button: Off Color"
    id: button_1_off_color
    optimistic: true
    restore_value: true
    initial_value: "313131"
    min_length: 6
    max_length: 6
    mode: text
    entity_category: config
    icon: "mdi:palette-outline"
    web_server:
      sorting_group_id: sg_button

select:
  - platform: template
    name: "Button: Icon"
    id: button_1_icon
    optimistic: true
    restore_value: true
    initial_option: "Auto"
    options:
      - "Auto"
      - "Lightbulb"
      - "Power Plug"
      - "Fan"
      - "Lock"
      - "Garage"
      - "Blinds Open"
      - "Blinds Closed"
      - "Thermometer"
      - "Speaker"
      - "Television"
      - "Camera"
      - "Motion Sensor"
      - "Door"
      - "Window"
      - "Water Heater"
      - "Air Conditioner"
      - "Battery"
      - "LED Strip"
      - "Power"
    entity_category: config
    icon: "mdi:image-outline"
    web_server:
      sorting_group_id: sg_button
